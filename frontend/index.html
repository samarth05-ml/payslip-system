<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payslip Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <img src="assets/ymgm-logo.jpg" alt="logo">
            <h2>MGM</h2>
            <h5>Evening College</h5>
        </div>

        <ul>
    <li class="active">
        <img src="./assets/dashboard.svg" class="icon"> Dashboard
    </li>

    <li>
        <img src="./assets/payslip.svg" class="icon"> Generate Payslip
    </li>

    <li>
        <img src="./assets/leave.svg" class="icon"> Leave Prediction
    </li>

    <li>
        <img src="./assets/anomaly.svg" class="icon"> Detect Anomaly
    </li>

    <li>
        <img src="./assets/behavior.svg" class="icon"> Employee Behavior
    </li>
</ul>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- Topbar -->
        <div class="topbar">
            <h3>Welcome, Admin</h3>
            <div class="profile">
                <img src="assets/profile.svg" alt="profile">
            </div>
        </div>

        <!-- Header -->
        <div class="header">
            <h1>Payslip Management System</h1>
            <p>Manage employees and analyze using ML</p>
        </div>

        <!-- Stats -->
        <div class="cards">

            <div class="card">
                <h3>Total Employees</h3>
                <p id="total_employees">0</p>
            </div>

            <div class="card">
                <h3>Payslips</h3>
                <p id="total_payslips">0</p>
            </div>

            <div class="card">
                <h3>Predictions</h3>
                <p id="total_predictions">0</p>
            </div>

            <div class="card">
                <h3>Anomalies</h3>
                <p id="total_anomalies">0</p>
            </div>

        </div>

        <!-- Chart -->
        <div class="chart-card">
            <h3>Salary Trend</h3>
            <canvas id="salaryChart" height="100"></canvas>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="./script.js"></script>

</body>
</html>
